<html>
<head>
<style>
.contenedor{
    width: 400px;
    height: 200px;
    border: 1px solid black;
    position: relative;
    margin: 50px auto;
}

.cuadrito{
    width: 100px;
    height: 100px;
    background: blue;
    position: absolute;

    animation: cuadrito 1s infinite alternate ease-in-out;
}

@keyframes cuadrito {
    from{ left: 0; }
    to{ left: 300px; }
}
</style>
</head>
<body>



<div class="contenedor">
    <div class="cuadrito"></div>
</div>

</body>
</html>
