<html>
<head>
    <title>ANIMACION 3 CSS</title>
    <style>
    *{
        padding: 0;
        margin: 0;
    }

    .contenedor{
        width: 400px;
        height: 200px;
        border: 1px solid black;
        position: relative;
        margin: 50px auto;
        overflow: hidden;
    }

    .cuadrito{
        width: 100px;
        height: 100px;
        background-color: greenyellow;
        position: absolute;
        left: 150px; 

        animation: cuadrito 1s infinite alternate ease-in-out;
    }

    @keyframes cuadrito{
        from{
            top: 0;
        }
        to{
            top: 100px;
        }
    }
    </style>
</head>
<body>

<div class="contenedor">
    <div class="cuadrito"></div>
</div>

</body>
</html>
