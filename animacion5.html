<html>
<head>
<style>
body{
    margin: 0;
    background: black;
}

.contenedor{
    width: 600px;
    height: 500px;
    border: 2px solid white;
    margin: 50px auto;
    position: relative;
    overflow: hidden;
    background: black;
}

.estrella{
    position: absolute;
    width: 4px;
    height: 4px;
    background: white;
}

.e1{ left: 50px; top: 0; animation: caer 2s linear infinite; }
.e2{ left: 150px; top: 0; animation: caer 3s linear infinite; }
.e3{ left: 300px; top: 0; animation: caer 2.5s linear infinite; }
.e4{ left: 450px; top: 0; animation: caer 3.5s linear infinite; }
.e5{ left: 520px; top: 0; animation: caer 2.2s linear infinite; }


@keyframes caer{
    from{ 
        top: 0; 
    }
to{
     top: 500px; }
}


.nave{
    width: 300px;
    height: 300px;
    position: absolute;
    background-image: url("img/nave.gif"); 
    background-size: contain;
    background-repeat: repeat;
    left: 150px;
    top: 100px;
    animation: rotar 2s infinite alternate;
}

@keyframes rotar{
    from{ transform: rotate(0deg); }
    to{ transform: rotate(10deg); }
}
</style>
</head>
<body>

<div class="contenedor">

    <div class="estrella e1"></div>
    <div class="estrella e2"></div>
    <div class="estrella e3"></div>
    <div class="estrella e4"></div>
    <div class="estrella e5"></div>
    <div class="nave"></div>

</div>

</body>
</html>
